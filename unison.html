<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migration Letter Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        #inputArea {
            min-height: 120px;
        }

        #outputArea {
            min-height: 400px;
            background-color: #f9fafb;
        }

        .help-text {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        #outputContainer {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #e5e7eb;
        }

        #outputContainer.show {
            display: block;
        }

        .error-message {
            display: none;
            padding: 12px 16px;
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #991b1b;
            font-size: 13px;
            margin-top: 16px;
        }

        .error-message.show {
            display: block;
        }

        .success-badge {
            display: inline-block;
            background-color: #dcfce7;
            border: 1px solid #86efac;
            border-radius: 6px;
            color: #166534;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .icon {
            width: 16px;
            height: 16px;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Migration Letter Generator</h1>

        <div class="form-group">
            <label for="inputArea">Service Details</label>
            <textarea id="inputArea" placeholder="Tyrone Cunningham UNISON0000054175B01&#10;John Smith  UNISON0000054176B02&#10;Jane Doe  UNISON0000054177B03"></textarea>
            <p class="help-text">Each line: Customer Name (1st) and Service ID (last) separated by tab or space.</p>
        </div>

        <div class="button-group">
            <button onclick="generateOutput()">
                ✨ Generate Letters
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="outputContainer">
            <div class="form-group">
                <label for="outputArea">Output (Easy Copy)</label>
                <textarea id="outputArea" readonly></textarea>
                <div id="successBadge" class="success-badge" style="display: none;">✓ Generated Successfully</div>
            </div>

            <div class="button-group">
                <button onclick="copyToClipboard()">
                    📋 Copy to Clipboard
                </button>
                <button onclick="downloadFile()" style="background-color: #059669;">
                    ⬇️ Download as TXT
                </button>
            </div>
        </div>
    </div>

    <script>
        function generateOutput() {
            const input = document.getElementById('inputArea').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const outputContainer = document.getElementById('outputContainer');
            const successBadge = document.getElementById('successBadge');

            errorDiv.classList.remove('show');
            successBadge.style.display = 'none';

            if (!input) {
                errorDiv.textContent = '❌ Please enter service details.';
                errorDiv.classList.add('show');
                outputContainer.classList.remove('show');
                return;
            }

            // Split by newlines and filter empty lines
            const lines = input.split('\n').filter(line => line.trim() !== '');

            if (lines.length === 0) {
                errorDiv.textContent = '❌ Please enter at least one line of service details.';
                errorDiv.classList.add('show');
                outputContainer.classList.remove('show');
                return;
            }

            // Parse each line
            const servicePairs = [];
            for (let i = 0; i < lines.length; i++) {
                // Split by tab first, then by space if no tab
                let parts;
                if (lines[i].includes('\t')) {
                    parts = lines[i].split('\t').map(p => p.trim());
                } else {
                    // Split by spaces and find where the service ID starts
                    const allParts = lines[i].trim().split(/\s+/);
                    // Service ID is the last part
                    const serviceId = allParts[allParts.length - 1];
                    const customerName = allParts.slice(0, -1).join(' ');
                    parts = [customerName, serviceId];
                }
                
                if (parts.length < 2) {
                    errorDiv.textContent = `❌ Line ${i + 1}: Please enter customer name and service ID.`;
                    errorDiv.classList.add('show');
                    outputContainer.classList.remove('show');
                    return;
                }
                servicePairs.push({
                    customer: parts[0],  // 1st is Customer (full name)
                    service: parts[1]   // 2nd is Service (ID)
                });
            }

            // Build the letter header
            let output = `Hi Team,

We're writing to let you know that one of your broadband services will be migrated from a legacy Unison service to a new TFF service on 2026-04-22.

`;

            // Add all service/customer pairs
            for (const pair of servicePairs) {
                output += `Service: ${pair.service}\n`;
                output += `Customer: ${pair.customer}\n\n`;
            }

            // Add the rest of the template
            output += `What to expect:

You may see some Churn orders in your system, this is normal as from TFF perspective this is a product family change which is seen as disconnect and new connect

We expect little to no downtime during the migration
Your IP address will remain the same

The ASID of your service will change and the new ASID will be confirmed once the order has been placed

Following the migration, your service will remain on the same plan and price

Should you experience any issues following the migration, please reach out to our support team through your usual channels.`;

            document.getElementById('outputArea').value = output;
            outputContainer.classList.add('show');
            successBadge.style.display = 'inline-block';
        }

        function copyToClipboard() {
            const outputArea = document.getElementById('outputArea');
            outputArea.select();
            document.execCommand('copy');

            const button = event.target;
            const originalText = button.textContent;
            button.textContent = '✓ Copied!';
            button.style.backgroundColor = '#10b981';

            setTimeout(() => {
                button.textContent = originalText;
                button.style.backgroundColor = '#2563eb';
            }, 2000);
        }

        function downloadFile() {
            const outputArea = document.getElementById('outputArea');
            const text = outputArea.value;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', 'migration_letter_' + new Date().getTime() + '.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Allow Ctrl+Enter in input to generate
        document.getElementById('inputArea').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateOutput();
            }
        });
    </script>
</body>
</html>
